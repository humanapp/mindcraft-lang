name: Publish @mindcraft-lang/typescript

on:
  push:
    tags:
      - "typescript-v*"

permissions:
  contents: write

jobs:
  publish:
    name: Build, Lint, Publish & Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check
        run: npm run check:only

      - name: Build
        run: npm run build

      - name: "Rewrite local file: deps to version ranges"
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          for (const [name, val] of Object.entries(pkg.dependencies || {})) {
            if (val.startsWith('file:')) {
              const sibling = JSON.parse(fs.readFileSync(`${val.slice(5)}/package.json`, 'utf8'));
              pkg.dependencies[name] = `^${sibling.version}`;
            }
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          EOF

      - name: Verify package version matches tag
        run: |
          PACKAGE_VERSION="typescript-v$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "${{ github.ref_name }}" ]; then
            echo "Tag ${{ github.ref_name }} does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
