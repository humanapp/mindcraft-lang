name: Publish @mindcraft-lang/app-host

on:
  push:
    tags:
      - "app-host-v*"

permissions:
  contents: write

jobs:
  publish:
    name: Lint, Build, Publish & Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/app-host

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: "Rewrite local file: deps to version ranges"
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          for (const [name, val] of Object.entries(pkg.dependencies || {})) {
            if (val.startsWith('file:')) {
              const localPath = val.slice(5);
              const sibling = JSON.parse(fs.readFileSync(`${localPath}/package.json`, 'utf8'));
              if (!sibling.private) {
                pkg.dependencies[name] = `^${sibling.version}`;
                // Remove the file:-based lockfile entries so npm re-resolves from registry
                delete lock.packages[localPath];
                delete lock.packages[`node_modules/${name}`];
              }
            }
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2) + '\n');
          EOF
          npm install --package-lock-only

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check
        run: npm run check

      - name: Build
        run: npm run build

      - name: "Strip private local file: deps before publish"
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          for (const [name, val] of Object.entries(pkg.dependencies || {})) {
            if (val.startsWith('file:')) {
              const sibling = JSON.parse(fs.readFileSync(`${val.slice(5)}/package.json`, 'utf8'));
              if (sibling.private) delete pkg.dependencies[name];
            }
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          EOF

      - name: Verify package version matches tag
        run: |
          PACKAGE_VERSION="app-host-v$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "${{ github.ref_name }}" ]; then
            echo "Tag ${{ github.ref_name }} does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
