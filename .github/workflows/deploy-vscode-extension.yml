name: Deploy vscode-extension

on:
  push:
    tags:
      - "vscode-extension-v*"

permissions:
  contents: write

jobs:
  publish:
    name: Build, Lint, Publish & Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/vscode-extension

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: "Rewrite public local file: deps to version ranges"
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          for (const [name, val] of Object.entries(pkg.devDependencies || {})) {
            if (val.startsWith('file:')) {
              const localPath = val.slice(5);
              const sibling = JSON.parse(fs.readFileSync(`${localPath}/package.json`, 'utf8'));
              if (!sibling.private) {
                pkg.devDependencies[name] = `^${sibling.version}`;
                // Remove the file:-based lockfile entries so npm re-resolves from registry
                delete lock.packages[localPath];
                delete lock.packages[`node_modules/${name}`];
              }
            }
          }
          for (const [name, val] of Object.entries(pkg.dependencies || {})) {
            if (val.startsWith('file:')) {
              const localPath = val.slice(5);
              const sibling = JSON.parse(fs.readFileSync(`${localPath}/package.json`, 'utf8'));
              if (!sibling.private) {
                pkg.dependencies[name] = `^${sibling.version}`;
                delete lock.packages[localPath];
                delete lock.packages[`node_modules/${name}`];
              }
            }
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2) + '\n');
          EOF
          npm install --package-lock-only

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check
        run: npm run check:only

      - name: Build
        run: npm run build

      - name: Verify package version matches tag
        run: |
          PACKAGE_VERSION="vscode-extension-v$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "${{ github.ref_name }}" ]; then
            echo "Tag ${{ github.ref_name }} does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
