name: Deploy vscode-bridge

on:
  push:
    tags:
      - "vscode-bridge-v*"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/vscode-bridge

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, tag, and push Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f apps/vscode-bridge/Dockerfile \
            -t "$IMAGE_NAME:$IMAGE_TAG" \
            -t "$IMAGE_NAME:latest" \
            .

          docker push "$IMAGE_NAME:$IMAGE_TAG"
          docker push "$IMAGE_NAME:latest"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VSCODE_BRIDGE_EC2_HOST }}
          username: ${{ secrets.VSCODE_BRIDGE_EC2_USER }}
          key: ${{ secrets.VSCODE_BRIDGE_EC2_SSH_KEY }}
          script: |
            docker compose -f /opt/vscode-bridge/docker-compose.yml pull
            docker compose -f /opt/vscode-bridge/docker-compose.yml up -d
            docker image prune -f
